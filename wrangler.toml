name = "calendar-display"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Production Worker: calendar-display.bwehner.workers.dev
# Deploys automatically when changes are pushed to the main branch

# Plain (non-secret) variables available to the Worker at runtime.
# NWS_USER_AGENT: the identity string sent in outbound requests to api.weather.gov.
# NWS asks developers to include contact info so they can reach you if needed.
# This value is NOT sensitive — it is visible in outbound request headers only.
[vars]
NWS_USER_AGENT = "FFD-Station-Display/1.0 (fargond.gov)"

[env.staging]
name = "calendar-display-staging"
# Staging inherits [vars] from the top-level section above.

# Staging Worker: calendar-display-staging.bwehner.workers.dev
# Deploys automatically when changes are pushed to the staging branch
