name: Deploy to Cloudflare Workers
on:
  push:
    branches:
      - main      # Deploys to production Worker: calendar-display
      - staging   # Deploys to staging Worker:    calendar-display-staging
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      # Determine which Wrangler environment to deploy based on the branch.
      # Pushes to staging use the [env.staging] block in wrangler.toml.
      # Pushes to main use the root config (no environment flag needed).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.71.0'
          environment: ${{ github.ref == 'refs/heads/staging' && 'staging' || '' }}
          secrets: |
            NEXTCLOUD_URL
            NEXTCLOUD_USERNAME
            NEXTCLOUD_PASSWORD
        env:
          NEXTCLOUD_URL:      ${{ secrets.NEXTCLOUD_URL }}
          NEXTCLOUD_USERNAME: ${{ secrets.NEXTCLOUD_USERNAME }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
